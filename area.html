<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スレ一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="area-title">スレ一覧</h2>

<div id="thread-list"></div>

<br>
<button id="new-thread-btn">新規スレ作成</button>

<script>

const ADMIN_PASSWORD = "yuki-admin"; // 勇気さんが自由に変更OK



// URLパラメータから地域IDを取得
const url = new URL(location.href);
const area = url.searchParams.get("area");

// 地域名を表示（必要なら後で日本語名に変換してもOK）
document.getElementById("area-title").textContent = area + " のスレ一覧";

// スレ一覧を読み込む
function loadThreads() {
  db.collection("areas")
    .doc(area)
    .collection("threads")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
      const list = document.getElementById("thread-list");
      list.innerHTML = "";

      snapshot.forEach(doc => {
  const data = doc.data();
  const id = doc.id;

  list.innerHTML += `
    <div class="thread-item">
      <a href="thread.html?area=${area}&id=${id}">
        ${data.title}
      </a>

      <a href="#" class="delete-thread" onclick="deleteThread('${id}')">削除</a>
    </div>
  `;
});            

function deleteThread(threadId) {
  const pass = prompt("管理者パスワードを入力してください");
  if (pass !== ADMIN_PASSWORD) {
    alert("パスワードが違います");
    return;
  }

  const ok = confirm("このスレッドを削除しますか？");
  if (!ok) return;

  db.collection("areas")
    .doc(area)
    .collection("threads")
    .doc(threadId)
    .delete()
    .then(() => {
      alert("スレッドを削除しました");
    });
}
          </div>
        `;
      });
    });
}

// 新規スレ作成
document.getElementById("new-thread-btn").onclick = async () => {
  const title = prompt("スレタイトルを入力してください");

  if (!title) return;

  await db.collection("areas")
    .doc(area)
    .collection("threads")
    .add({
      title: title,
      createdAt: new Date()
    });

  alert("スレを作成しました");
};

loadThreads();
</script>

</body>
</html>
